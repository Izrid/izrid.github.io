  customHeadCode: |
    <style>
      .terminal-output code { color: #5af; }
      .terminal-output code::before,
      .terminal-output code::after { content: '`'; color: #5af; }
      .terminal-output pre code { color: inherit; }
      .terminal-output pre code::before,
      .terminal-output pre code::after { content: none; }
      @keyframes bannerRainbow {
        0%   { color: hsl(120, 100%, 55%); }
        25%  { color: hsl(180, 100%, 55%); }
        50%  { color: hsl(270, 100%, 65%); }
        75%  { color: hsl(300, 100%, 60%); }
        100% { color: hsl(120, 100%, 55%); }
      }
      .banner-line {
        display: block;
        white-space: pre;
        font-weight: bold;
        animation: bannerRainbow 4s linear infinite;
      }
      /* Mobile posts folder grid (rendered in terminal output) */
      .mpo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.1rem;
        margin: 0.25rem 0;
      }
      .mpo-folder {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        color: inherit;
        padding: 0.6rem 0.25rem;
        -webkit-tap-highlight-color: transparent;
        width: 100%;
        box-sizing: border-box;
      }
      .mpo-folder:active .mpo-art {
        color: #7f7;
        text-shadow: 0 0 12px rgba(68,255,68,0.6);
      }
      .mpo-folder:active .mpo-label { color: #ccc; }
      .mpo-art {
        font-family: inherit;
        font-size: 0.62em;
        color: #4f4;
        text-shadow: 0 0 6px rgba(68,255,68,0.3);
        margin: 0;
        line-height: 1.25;
        white-space: pre;
        display: block;
      }
      .mpo-label {
        margin-top: 0.35rem;
        font-size: 0.72em;
        color: #777;
        text-align: center;
        display: block;
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mpo-hint {
        display: block;
        color: #3a3a3a;
        font-size: 0.78em;
        padding: 0.3rem 0 0.1rem;
        font-style: italic;
      }
    </style>

