  customHeadCode: |
    <style>
      .terminal-output code { color: #5af; }
      .terminal-output code::before,
      .terminal-output code::after { content: '`'; color: #5af; }
      .terminal-output pre code { color: inherit; }
      .terminal-output pre code::before,
      .terminal-output pre code::after { content: none; }
      @keyframes bannerRainbow {
        0%   { color: hsl(120, 100%, 55%); }
        25%  { color: hsl(180, 100%, 55%); }
        50%  { color: hsl(270, 100%, 65%); }
        75%  { color: hsl(300, 100%, 60%); }
        100% { color: hsl(120, 100%, 55%); }
      }
      .banner-line {
        display: block;
        white-space: pre;
        font-weight: bold;
        animation: bannerRainbow 4s linear infinite;
      }
      /* Mobile posts GUI overlay */
      #mpo-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #0d0d0d;
        z-index: 9999;
        flex-direction: column;
        font-family: monospace;
        color: #ccc;
        overflow: hidden;
      }
      .mpo-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #0d0d0d;
        border-bottom: 1px solid #2a2a2a;
        padding: 0.75rem 1rem;
        flex-shrink: 0;
      }
      .mpo-title {
        color: #4f4;
        font-weight: bold;
        font-size: 1.05em;
        letter-spacing: 0.05em;
      }
      .mpo-back, .mpo-close {
        background: none;
        font-family: inherit;
        font-size: 0.9em;
        padding: 0.45rem 0.9rem;
        cursor: pointer;
        border-radius: 3px;
        min-width: 64px;
        line-height: 1;
      }
      .mpo-back { border: 1px solid #4f4; color: #4f4; }
      .mpo-close { border: 1px solid #f55; color: #f55; }
      .mpo-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .mpo-card {
        display: flex;
        flex-direction: column;
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 0.9rem 1rem;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        color: inherit;
        text-decoration: none;
        min-height: 56px;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
      }
      .mpo-card:active { border-color: #4f4; background: #181818; }
      .mpo-cat-name {
        color: #4f4;
        font-weight: bold;
        font-size: 1em;
      }
      .mpo-meta {
        color: #555;
        font-size: 0.8em;
        margin-top: 0.25rem;
      }
      .mpo-post-title {
        color: #ddd;
        font-size: 0.95em;
        line-height: 1.35;
      }
